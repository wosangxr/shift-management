version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shift_mgmt_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: shift_admin
      POSTGRES_PASSWORD: shift_secret_2026
      POSTGRES_DB: shift_management
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shift_admin -d shift_management"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
